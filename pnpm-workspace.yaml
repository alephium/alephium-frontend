packages:
  - 'apps/*'
  - 'packages/*'

# hoisted: the mobile wallet (React Native / Expo + Metro) needs a flat
# node_modules (Metro doesn't reliably resolve pnpm's default symlinked
# (isolated) layout). Trade-off: undeclared "phantom" deps can resolve from the
# hoisted root, so import-x/no-extraneous-dependencies (in @alephium/eslint-config)
# guards against that at lint time.
nodeLinker: hoisted
autoInstallPeers: true
frozenLockfile: true
# pnpm 11 runs a full install (re-executing every postinstall lifecycle script)
# before each `pnpm run` / `pnpm exec`. Combined with mobile-wallet's
# `postinstall: turbo build:deps`, that recurses forever (install -> postinstall ->
# turbo build:deps -> pnpm re-entry -> install -> ...) and needlessly re-runs all
# postinstalls on every script invocation across the monorepo. Disable it; we rely
# on explicit `pnpm install` + frozenLockfile instead.
verifyDepsBeforeRun: false
sideEffectsCache: false
minimumReleaseAge: 10080 # 7 days
minimumReleaseAgeExclude:
  - '@alephium/'
  - undici@6.27.0 # pnpm audit flags undici as a vulnerable dependency but the patched version is not 7 days old
  - dompurify@3.4.11 # TODO: Remove after updating posthog-js once it is old enough

patchedDependencies:
  '@expo/cli@55.0.32': patches/@expo__cli@55.0.32.patch # TODO: remove after bumping @expo/cli past 55.0.32 (fixes `expo run:ios --device` "Cannot convert object to primitive value"; fixed upstream, see expo/expo#46114)
  '@metamask/scure-bip39@2.1.1': patches/@metamask__scure-bip39@2.1.1.patch
  js-yaml@4.2.0: patches/js-yaml@4.2.0.patch

overrides:
  'ws@>=8.0.0 <8.21.0': '=8.21.0'
  'file-type@>=13.0.0 <21.3.2': '=21.3.2'
  'postcss@<8.5.10': '=8.5.10'
  'fast-xml-parser@<5.7.0': '=5.7.0'
  'uuid@<14.0.0': '>=14.0.0'
  'js-yaml@<4.1.2': '>4.1.2'
  'on-headers@<1.1.0': '=1.1.0'
  'undici@<6.27.0': '=6.27.0'
  'qs@>=6.11.1 <=6.15.1': '=6.15.2'
  'dompurify@<3.4.11': '=3.4.11' # TODO: Remove after updating posthog-js once it is old enough
  'tar@<7.5.16': '=7.5.16' # TODO: Remove after updating electron-builder to v26

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  '@sentry/cli': true
  '@buoy-gg/shared-ui': false
  core-js: false
  msw: false
  unrs-resolver: true # native resolver used by eslint-plugin-import-x
  '@shopify/react-native-skia': true # downloads native Skia binaries in postinstall (install-skia.mjs)
