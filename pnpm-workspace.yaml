packages:
  - 'apps/*'
  - 'packages/*'

nodeLinker: hoisted
autoInstallPeers: true
frozenLockfile: true
sideEffectsCache: false
minimumReleaseAge: 10080 # 7 days
minimumReleaseAgeExclude:
  - '@alephium/'

patchedDependencies:
  '@metamask/scure-bip39@2.1.1': patches/@metamask__scure-bip39@2.1.1.patch

overrides:
  'picomatch@<2.3.2': '=2.3.2'
  'picomatch@>=3.0.0 <3.0.2': '=3.0.2'
  'picomatch@>=4.0.0 <4.0.4': '=4.0.4'
  'lodash@<=4.17.23': '>=4.18.0'
  'lodash-es@<=4.17.23': '>=4.18.0'
  '@xmldom/xmldom@<0.8.13': '=0.8.13'
  'defu@<=6.1.4': '=6.1.5'
  'file-type@>=13.0.0 <21.3.2': '=21.3.2'
  'brace-expansion@>=4.0.0 <5.0.6': '=5.0.6'
  'yaml@>=2.0.0 <2.8.3': '=2.8.3'
  'on-headers@<1.1.0': '=1.1.0'
  'tar@<7.5.16': '=7.5.16'
  'minimatch@<3.1.4': '=3.1.4'
  'h3@<1.15.9': '=1.15.9'
  'fast-xml-parser@<5.7.0': '=5.7.0'
  'flatted@<=3.4.1': '=3.4.2'
  'node-forge@<1.4.0': '=1.4.0'
  'uuid@<14.0.0': '>=14.0.0'
  'postcss@<8.5.10': '=8.5.10'
  'fast-uri@<3.1.2': '=3.1.2'
  'fast-xml-builder@<1.1.7': '=1.1.7'
  'ws@>=6.0.0 <6.2.4': '=6.2.4'
  'ws@>=7.0.0 <7.5.11': '=7.5.11'
  'ws@>=8.0.0 <8.21.0': '=8.21.0'
  '@walletconnect/utils@<2.21.10': '=2.21.10'
  'shell-quote@<1.8.3': '=1.8.4'
  'joi@<17.13.4': '=17.13.4'
  'js-yaml@<4.2.0': '=4.2.0'
  'tmp@<0.2.7': '=0.2.7'
  'form-data@<4.0.6': '=4.0.6'

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  '@sentry/cli': true
  '@buoy-gg/shared-ui': false
  core-js: false
  msw: false
