packages:
  - 'apps/*'
  - 'packages/*'

# hoisted: the mobile wallet (React Native / Expo + Metro) needs a flat
# node_modules (Metro doesn't reliably resolve pnpm's default symlinked
# (isolated) layout). Trade-off: undeclared "phantom" deps can resolve from the
# hoisted root, so import-x/no-extraneous-dependencies (in @alephium/eslint-config)
# guards against that at lint time.
nodeLinker: hoisted
autoInstallPeers: true
frozenLockfile: true
# pnpm 11 runs a full install (re-executing every postinstall lifecycle script)
# before each `pnpm run` / `pnpm exec`. Combined with mobile-wallet's
# `postinstall: turbo build:deps`, that recurses forever (install -> postinstall ->
# turbo build:deps -> pnpm re-entry -> install -> ...) and needlessly re-runs all
# postinstalls on every script invocation across the monorepo. Disable it; we rely
# on explicit `pnpm install` + frozenLockfile instead.
verifyDepsBeforeRun: false
sideEffectsCache: false
minimumReleaseAge: 10080 # 7 days
minimumReleaseAgeExclude:
  - '@alephium/*'
  - fast-uri@3.1.4 # TODO: remove on/after 2026-07-26, when it clears minimumReleaseAge on its own

patchedDependencies:
  '@expo/cli@55.0.32': patches/@expo__cli@55.0.32.patch # TODO: remove after bumping @expo/cli past 55.0.32 (fixes `expo run:ios --device` "Cannot convert object to primitive value"; fixed upstream, see expo/expo#46114)
  '@metamask/scure-bip39@2.1.1': patches/@metamask__scure-bip39@2.1.1.patch
  js-yaml@4: patches/js-yaml@4.3.0.patch # re-adds safeLoad/safeLoadAll/safeDump as aliases to load/loadAll/dump so read-yaml-file@1.1.0 (via @manypkg/get-packages@1.1.3, pinned by @changesets/cli@2.31.0) survives the js-yaml>=4 audit override. TODO: remove after upgrading to @changesets/cli@3 (its @manypkg/get-packages@3 drops read-yaml-file); see changesets#1762 / #1772

overrides:
  # Single prettier 3 across the workspace. autoInstallPeers pulls a second copy in for
  # eslint-plugin-prettier (which declares prettier as a peer), and the two versions format
  # nested ternaries differently: `pnpm format` (root prettier) and `pnpm lint`
  # (eslint-plugin-prettier's copy) then rewrite each other's output forever.
  # Scoped to >=3 on purpose: @changesets/* pin prettier ^2.7.1 and call its sync format(),
  # which prettier 3 made async - forcing them to 3.x breaks `pnpm changeset`.
  'prettier@>=3': '=3.2.4'
  'ws@>=8.0.0 <8.21.0': '=8.21.0'
  'file-type@>=13.0.0 <21.3.2': '=21.3.2'
  'postcss@<8.5.10': '=8.5.10'
  'fast-xml-parser@<5.7.0': '=5.7.0'
  'uuid@<14.0.0': '>=14.0.0'
  'js-yaml@<4.3.0': '=4.3.0'
  'on-headers@<1.1.0': '=1.1.0'
  'undici@<6.27.0': '=6.27.0'
  'qs@>=6.11.1 <=6.15.1': '=6.15.2'
  # dompurify's only consumer is posthog-js, which declares `^3.3.2` - including on the latest
  # release (1.399.2), so bumping posthog-js does NOT let this override go (an earlier TODO here
  # claimed it would). It stays until posthog-js raises its own floor past the vulnerable range.
  'dompurify@<3.4.12': '=3.4.12'
  'tar@<7.5.19': '=7.5.19' # TODO: Remove after updating electron-builder to v26
  'brace-expansion@<1.1.16': '=1.1.16'
  'brace-expansion@>=2.0.0 <2.1.2': '=2.1.2'
  'brace-expansion@>=3.0.0 <5.0.7': '=5.0.7'
  'shell-quote@<1.8.5': '=1.9.0'
  # powfi-sdk declares @alephium/web3 as an exact regular dependency instead of a peer, so it pulls
  # in a second copy whenever the workspace pin differs. Two copies means two distinct SignerProvider
  # classes, and TypeScript's nominal check on protected members rejects our signer at Powfi.load();
  # at runtime it would also give the SDK its own web3 global (node provider, contract registry).
  '@alephium/powfi-sdk>@alephium/web3': '3.0.5'

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  '@sentry/cli': true
  '@buoy-gg/shared-ui': false
  core-js: false
  msw: false
  unrs-resolver: true # native resolver used by eslint-plugin-import-x
  '@shopify/react-native-skia': true # downloads native Skia binaries in postinstall (install-skia.mjs)
